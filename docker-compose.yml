services:
  mysql:
    image: mysql:8.0
    container_name: zcore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: zcore_dev
      MYSQL_DATABASE: zcore
    ports:
      - "3306:3306"
    volumes:
      - zcore_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pzcore_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zcore_mysql_data:
